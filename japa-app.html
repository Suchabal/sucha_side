<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japa Counter</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 24px;
            text-align: center;
        }
        .counter {
            font-size: 48px;
            margin: 20px;
        }
        .button {
            padding: 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            outline: none;
        }
    </style>
</head>
<body>
    <h1>Aum Tryambakam Japa Counter</h1>
    <div class="counter" id="countDisplay">0</div>
    <button class="button" id="countButton">Count</button>
    <p class="sanskrit-text">Aum Tryambakam yajaamahe sugandhim pushtivardhanam | Urvaarukamiva bandhanaan-mrityormuksheeya maamritaat ||</p>

    <script>
        let count = 0;
        const countDisplay = document.getElementById('countDisplay');
        const countButton = document.getElementById('countButton');

        countButton.onclick = function() {
            if (count < 108) {
                count++;
                countDisplay.textContent = count;
            }
        };
    </script>
</body>
</html>
